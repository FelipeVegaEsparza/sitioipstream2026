<!DOCTYPE html>

<title>Página no encontrada - IPStream</title>

<link rel="canonical" href="https://ipstream.cl/">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #312e81 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; position: relative; }
.bg-circle { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
.bg-circle-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; animation: float 8s ease-in-out infinite; }
.bg-circle-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -80px; right: -80px; animation: float 10s ease-in-out infinite reverse; }
.bg-circle-3 { width: 200px; height: 200px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 6s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
@keyframes pulse { 0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.3); } }
.container { max-width: 500px; padding: 2rem; position: relative; z-index: 1; }
.logo { margin-bottom: 2rem; }
.logo img { height: 50px; width: auto; }
.icon-404 { font-size: 7rem; line-height: 1; margin-bottom: 1rem; display: flex; justify-content: center; gap: 0.5rem; }
.icon-404 span { display: inline-block; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: bounce404 2s ease-in-out infinite; }
.icon-404 span:nth-child(2) { animation-delay: 0.2s; }
.icon-404 span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce404 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
.message-icon { margin: 1.5rem 0; }
.message-icon svg { width: 64px; height: 64px; color: rgba(96, 165, 250, 0.6); animation: pulse 3s ease-in-out infinite; }
h2 { font-size: 1.5rem; margin-bottom: 0.75rem; font-weight: 600; }
p { color: #c7d2fe; margin-bottom: 2rem; line-height: 1.7; font-size: 1.05rem; }
.btn { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, #2563eb, #4f46e5); color: white; text-decoration: none; padding: 0.85rem 2rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.3s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -8px rgba(37,99,235,0.4); }
.btn svg { width: 18px; height: 18px; transition: transform 0.3s; }
.btn:hover svg { transform: translateX(-4px); }
</style>
</head>
<body>
<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>
<div class="bg-circle bg-circle-3"></div>

    <img src="/images/logos/logo.png" alt="IPStream">
  </div>
  <div class="icon-404">
    <span>4</span><span>0</span><span>4</span>
  </div>
  <div class="message-icon">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
  </div>
  <h2>Página no encontrada</h2>
  <p>La página que estás buscando no existe o ha sido movida. Mientras tanto, puedes volver al inicio y descubrir cómo crear tu radio online.</p>
  <a href="/" class="btn">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Volver al Inicio
  </a>
</div>
</body>
</html>
