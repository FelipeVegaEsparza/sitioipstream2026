services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - 80
    environment:
      NODE_ENV: production
      DB_HOST: 10.99.0.10
      DB_USER: ipstream_user
      DB_PASSWORD: 3517707aaAA@@
      DB_NAME: ipstream_db
      SITE_URL: http://sitioipstream-app-5w71j6-553d02-212-47-73-143.traefik.me/
      FLOW_API_KEY: 567F8F39-E1E2-4DC4-B2C4-7FE7A39L0990
      FLOW_SECRET_KEY: 071691ba89e4fa5ae23ed4aa9149b33b63919dcd
      ADMIN_USER: contacto@ipstream.cl
      ADMIN_PASS: 3517707aaAA
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass_2024
      MYSQL_DATABASE: ipstream_db
      MYSQL_USER: ipstream_user
      MYSQL_PASSWORD: 3517707aaAA@@
    volumes:
      - mysql_data:/var/lib/mysql
      - ./landing/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      app_net:
        ipv4_address: 10.99.0.10

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: 10.99.0.10
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
      BLOWFISH_SECRET: ipstream_secret_2026
    expose:
      - 80
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.0.0/24

volumes:
  mysql_data:
  uploads_data:
